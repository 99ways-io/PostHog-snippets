   <div class="container-small">
        <form onsubmit="registerWebinar(event)" class="form-div">
            <div class="field-relative">
                <input type="text" name="first_name" class="input-box" id="fname_form" placeholder="Name *" required autocomplete="first_name">
            </div>
            <div class="field-relative">
                <input type="email" name="email" class="input-box" id="email_form" placeholder="Email *" required autocomplete="email"><br>
            </div>
            <!-- Placeholder for the webinar times dropdown -->
            <div class="field-relative" id="webinarTimesPlaceholder"></div>
            <div class="field-relative">
                <input name="schedule_id" class="input-box" id="schedule_id" value=1 style="display:none">
                <input name="webinar_id" class="input-box" id="webinar_id" value='zHOhTs' style="display:none">

                <input class="form-submit" type="submit" value="SUBMIT" id="startregister" style="color: black;">
            </div>
        </form>
    </div>



<style>
  .field-relative{
    margin-top: 20px;
    width: 100%;
}
.input-box{
    border-radius: 4px;
    border: 1px solid rgb(213, 223, 238)!important;
    width: 100%;
    color: rgb(27, 36, 55)!important;
    outline: none;
    font-size: 14px;
    font-family: roboto;
  	padding: 14px 20px !important;
    height: 50px;
}
#startregister{
    background-color: rgb(253, 243, 80);
    border: rgb(253, 243, 80);
    font-weight: 600;
    transition: 0.3s;
  	font-size: 18px;
    border-radius: 5px;
    padding: 15px 70px;
    text-transform: uppercase;
    font-family: 'Roboto', sans-serif;
    letter-spacing: 1px;
    margin-top: 10px;
}
.form-submit:active {
   box-shadow: inset 0 0 2px #333;
    -webkit-transform: scale(0.98);
    transform: scale(0.98);
}
  
.field-relative{
    display: flex;
    justify-content: center;
}

</style>





<script>
	const fallbackWebinarID = 'zHOhTs';
  const webinarTimeField = document.getElementById('schedule_id');
  const webinarIdField = document.getElementById('webinar_id');


	function findWebinar(){
		const getQueryParamByKey = (key) => new URLSearchParams(window.location.search).get(key);
		forcedWebinarID = getQueryParamByKey('force_webinar');
		if (forcedWebinarID) {
			return forcedWebinarID;
		}

    // Default or dynamically assigned webinar ID. Replace "zHOhTs" or implement logic as needed.
    var assignedWebinarID = "zHOhTs";

		if (assignedWebinarID) {
			return assignedWebinarID;
		} else {
      return fallbackWebinarID;
		}
	
	};
	
  // Fetches webinar information, specifically upcoming times.
	function get_webinar_info(webinar_short_id) {
		// const request_info = new XMLHttpRequest(); // XMLHttpRequest is not used here.

		const url_get_webinar_info = 'https://api.joinnow.live/webinars/'+webinar_short_id+'/registration-information';
		
		fetch(url_get_webinar_info).then(response => {
			if (!response.ok) {
				throw new Error('Network response was not ok for webinar info.');
			}
			return response.json();
		})
		.then(data => {
      if (data && data['upcoming_times'] && data['upcoming_times'].length > 0) {
        set_webinar_time(data['upcoming_times'][0]); // Sets to the first upcoming time.
      } else {
        console.warn('No upcoming times found for webinar:', webinar_short_id);
        // Handle cases where no upcoming times are available, e.g., by disabling the form or showing a message.
      }
			set_webinar_id(webinar_short_id);
		})
		.catch(error => {console.error('Error fetching webinar times for ID ' + webinar_short_id + ':', error);});
	};
	
  // Sets the value of the hidden schedule_id input field.
	function set_webinar_time(webinarTime) {
            if(webinarTimeField) {
                webinarTimeField.value = webinarTime;
            } else {
                console.error("webinarTimeField (schedule_id input) not found in the DOM.");
            }
	};
	
  // Sets the value of the hidden webinar_id input field.
	function set_webinar_id(webinarIdValue) {
            if(webinarIdField) {
                webinarIdField.value = webinarIdValue;
            } else {
                console.error("webinarIdField (webinar_id input) not found in the DOM.");
            }
	};

  // Sends webinar registration data to PostHog.
  function syncPH(webinarIdValue,name,email,startTime) {
			posthog.capture(
				'webinar-registered', 
				{
					name: name,
					email: email,
					webinar_start_time: startTime,
					webinar_id: webinarIdValue,
					$set : {name: name, email: email, webinar_start_time: startTime, webinar_id: webinarIdValue}, // Sets user properties
					$set_once : {initial_name: name, initial_email: email, initial_webinar_start_time: startTime, initial_webinar_id: webinarIdValue} // Sets user properties only once
				}
				);
		};

  // Handles the form submission for webinar registration.
	function registerWebinar(event) {
		event.preventDefault(); // Prevent default form submission
		const firstName = document.getElementById('fname_form').value;
		const eMail = document.getElementById('email_form').value;
		const selectedTime = document.getElementById('schedule_id').value;
		const webinarIdValue = document.getElementById('webinar_id').value;
    
    // Identify the user in PostHog and send event data
    if (typeof posthog !== 'undefined') {
        posthog.identify(eMail);
        syncPH(webinarIdValue, firstName, eMail, selectedTime);
    } else {
        console.warn("PostHog SDK not found. Cannot identify user or send webinar registration event to PostHog.");
    }

		const postData = JSON.stringify({
			start_time: (selectedTime && selectedTime !== "undefined") ? selectedTime : (new Date(new Date().getTime() + 1000*30)).toISOString(),
			name: firstName,
			email: eMail,
      timezone: "America/New_York" // Consider making timezone dynamic or configurable if needed
		});

		fetch(`https://api.joinnow.live/webinars/${webinarIdValue}/registration`, {
			method: 'POST',
			headers: {
				'Content-Type': 'application/json'
			},
			body: postData
		})
		.then(response => response.json())
		.then(data => {
			window.location.href = "https://go.megantuohey.com/t/"+data.webinar_short_id+"?id=" + data.attendee.short_id;
		})
		.catch(error => {
			console.error('Error registering for webinar:', error);
		});
	}
  
  
  document.addEventListener('DOMContentLoaded', () => {
    
    posthog.onFeatureFlags(() => {
		    get_webinar_info(findWebinar());
    });
  });
</script>
